# Netlify configuratie voor Petje Af
#
# Functions worden auto-gedetecteerd in netlify/functions/
# Geen build step nodig — dit is een statische site.

[build]
  publish = "."
  functions = "netlify/functions"

# Node runtime voor de serverless functions
[functions]
  node_bundler = "esbuild"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
